name: Sentinel Triage

on:
  workflow_run:
    workflows: ["Tests", "CI"]
    types: [completed]

permissions:
  actions: read
  pull-requests: read
  issues: write

jobs:
  triage-failed-tests:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    env:
      SENTINEL_API_URL: ${{ secrets.SENTINEL_API_URL }}
    steps:
      - name: Download failed workflow logs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const response = await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            fs.writeFileSync("workflow-logs.zip", Buffer.from(response.data));

      - name: Extract logs
        run: |
          unzip -q workflow-logs.zip -d workflow-logs
          find workflow-logs -type f -maxdepth 3 -print0 | xargs -0 cat > pytest-output.txt
          head -c 60000 pytest-output.txt > sentinel-input.txt

      - name: Analyze failure
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ.get("SENTINEL_API_URL", "").rstrip("/")
          if not api_url:
              raise SystemExit("SENTINEL_API_URL secret is required")

          log = open("sentinel-input.txt", encoding="utf-8", errors="replace").read()
          payload = json.dumps({"log": log}).encode("utf-8")
          req = urllib.request.Request(
              f"{api_url}/analyze",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=45) as response:
              result = json.loads(response.read().decode("utf-8"))

          report = result.get("final_report", {})
          body = [
              "## Sentinel triage result",
              "",
              f"**Title:** {report.get('title', 'Unavailable')}",
              f"**Classification:** {report.get('classification', 'Unknown')}",
              f"**Error type:** {report.get('error_type', 'Unknown')}",
              f"**Analysis source:** {report.get('analysis_source', 'unknown')}",
              "",
              "### Root cause",
              report.get("root_cause", "No root cause returned."),
              "",
              "### Suggested fix steps",
          ]
          for step in report.get("fix_steps", []):
              body.append(f"- {step}")

          open("sentinel-comment.md", "w", encoding="utf-8").write("\n".join(body))
          PY

      - name: Comment on pull request
        if: ${{ github.event.workflow_run.pull_requests[0].number }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.workflow_run.pull_requests[0].number,
              body: fs.readFileSync("sentinel-comment.md", "utf8"),
            });
